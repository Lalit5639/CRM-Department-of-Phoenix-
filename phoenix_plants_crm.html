<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=index.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Plants CRM Redirect</title>

<body>
  <p>Redirecting to <a href="index.html">index.html</a>...</p>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAy_yNo_ZSWxCQRqE2wS4pM2VXqzXsLPWE",
  authDomain: "crm-phoenix-plants.firebaseapp.com",
  projectId: "crm-phoenix-plants",
  storageBucket: "crm-phoenix-plants.firebasestorage.app",
  messagingSenderId: "181950105640",
  appId: "1:181950105640:web:4af6ce43de93fe41030d1d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = function () {
  const email = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login Success ✅");
      window.location.href = "dashboard.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>
</body>
